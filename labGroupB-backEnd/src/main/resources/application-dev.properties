# Load .env file BEFORE other property sources
spring.config.import=optional:file:.env[.properties]

spring.datasource.url=jdbc:postgresql://localhost:5433/emtlabgroupb
spring.datasource.username=emc
spring.datasource.password=emc

spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
logging.level.org.flywaydb=DEBUG

logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# Accommodation Statistics Materialized View Refresh Configuration (Development)
# Refresh every 5 minutes for testing/development
accommodation.statistics.view.cron=0 */5 * * * *
accommodation.statistics.view.refresh-concurrently=true

jwt.secret=${JWT_SECRET_KEY}
jwt.expiration=864000000
jwt.header=Authorization
jwt.token-prefix=Bearer