spring.application.name=lab1-group-b
server.port=8080

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

spring.profiles.active=dev
spring.flyway.enabled=true

# Accommodation Statistics Materialized View Refresh Configuration
# Cron expression: Every hour at minute 0
# Format: second minute hour day_of_month month day_of_week
# 0 0 * * * * = Every hour at 00:00 minutes
# 0 */15 * * * * = Every 15 minutes
# 0 */5 * * * * = Every 5 minutes
accommodation.statistics.view.cron=0 0 * * * *
accommodation.statistics.view.refresh-concurrently=true
